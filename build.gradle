tasks.register('loadAgentArtifactGraph') {
    group = 'moqui-mcp'
    description = 'Load artifact graph JSONL export into MathEntities. Requires -PauthHeader, -PverticesFile, and -PedgesFile.'
    doLast {
        if (!defaultAuthHeader) throw new GradleException("Missing -PauthHeader for loadAgentArtifactGraph")
        def verticesFile = providers.gradleProperty('verticesFile').orNull
        def edgesFile = providers.gradleProperty('edgesFile').orNull
        def summaryFile = providers.gradleProperty('summaryFile').orNull
        if (!verticesFile || !edgesFile) throw new GradleException("Missing -PverticesFile or -PedgesFile for loadAgentArtifactGraph")

        def payload = groovy.json.JsonOutput.toJson([
                jsonrpc: '2.0',
                id     : 1,
                method : 'org.moqui.agent.AgentDocumentServices.load#ArtifactGraph',
                params : [
                        verticesFilePath  : verticesFile,
                        edgesFilePath     : edgesFile,
                        summaryFilePath   : summaryFile,
                        createMathModelRun: true,
                        graphId           : 'AgentArtifactGraph',
                        mathModelId       : 'AgentMoquiRagModel_v1'
                ]
        ])
        def connection = new URL(defaultRpcEndpoint.get()).openConnection()
        connection.setRequestMethod('POST')
        connection.setDoOutput(true)
        connection.setRequestProperty('Content-Type', 'application/json')
        connection.setRequestProperty('Authorization', defaultAuthHeader)
        connection.outputStream.withWriter('UTF-8') { it << payload }
        int code = connection.responseCode
        String body = (code >= 200 && code < 300 ? connection.inputStream : connection.errorStream)?.getText('UTF-8')
        println body
        if (code < 200 || code >= 300) throw new GradleException("loadAgentArtifactGraph failed with HTTP ${code}")
    }
}

tasks.register('registerAgentEmbeddingTensor') {
    group = 'moqui-mcp'
    description = 'Register embedding tensor metadata. Requires -PauthHeader and tensor/index settings.'
    doLast {
        if (!defaultAuthHeader) throw new GradleException("Missing -PauthHeader for registerAgentEmbeddingTensor")
        def embeddingModel = providers.gradleProperty('embeddingModel').orElse('text-embedding-3-small').get()
        def embeddingDimensions = providers.gradleProperty('embeddingDimensions').orElse('1536').get() as Integer
        def documentCount = providers.gradleProperty('documentCount').orElse('0').get() as Integer
        def tensorId = providers.gradleProperty('tensorId').orNull

        def payload = groovy.json.JsonOutput.toJson([
                jsonrpc: '2.0',
                id     : 1,
                method : 'org.moqui.agent.AgentMathModelServices.register#AgentEmbeddingTensor',
                params : [
                        tensorId            : tensorId,
                        mathModelId         : 'AgentMoquiRagModel_v1',
                        indexName           : defaultIndexName.get(),
                        embeddingProvider   : 'openai',
                        embeddingModel      : embeddingModel,
                        embeddingDimensions : embeddingDimensions,
                        documentCount       : documentCount,
                        contentLocation     : "opensearch://${defaultIndexName.get()}/embedding",
                        contentFormat       : 'opensearch-knn'
                ]
        ])
        def connection = new URL(defaultRpcEndpoint.get()).openConnection()
        connection.setRequestMethod('POST')
        connection.setDoOutput(true)
        connection.setRequestProperty('Content-Type', 'application/json')
        connection.setRequestProperty('Authorization', defaultAuthHeader)
        connection.outputStream.withWriter('UTF-8') { it << payload }
        int code = connection.responseCode
        String body = (code >= 200 && code < 300 ? connection.inputStream : connection.errorStream)?.getText('UTF-8')
        println body
        if (code < 200 || code >= 300) throw new GradleException("registerAgentEmbeddingTensor failed with HTTP ${code}")
    }
}

