tasks.register('prepareAllAgentDocs') {
    group = 'moqui-mcp'
    description = 'Generate all agent docs (screen + knowledge) and merge into global-agent-all-documents.jsonl.'
    dependsOn 'prepareScreenAgentDocs', 'prepareKnowledgeAgentDocs'
    inputs.dir(defaultOutputDir)
    outputs.file(defaultOutputDir.file('global-agent-all-documents.jsonl'))
    doLast {
        File outputDir = defaultOutputDir.asFile
        List<File> parts = [
            new File(outputDir, 'global-screen-prompt-documents.jsonl'),
            new File(outputDir, 'global-agent-knowledge-documents.jsonl'),
            new File(outputDir, 'global-business-pattern-documents.jsonl')
        ].findAll { it.exists() }
        File all = new File(outputDir, 'global-agent-all-documents.jsonl')
        all.text = ''
        parts.each { f -> all << f.getText('UTF-8'); if (!all.text.endsWith('\n')) all << '\n' }
        println "Wrote ${all} (${parts.size()} sources merged)"
    }
}

tasks.register('indexAllAgentDocs') {
    group = 'moqui-mcp'
    description = 'Index all agent documents (screen + knowledge) into OpenSearch via Moqui JSON-RPC.'
    dependsOn 'prepareAllAgentDocs'
