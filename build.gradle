apply plugin: 'groovy'

def componentNode = parseComponent(project)
version = componentNode.'@version'
def jarBaseName = componentNode.'@name'
def moquiDir = projectDir.parentFile.parentFile.parentFile
def frameworkDir = file(moquiDir.absolutePath + '/framework')

repositories {
    flatDir name: 'localLib', dirs: frameworkDir.absolutePath + '/lib'
    mavenCentral()
}

tasks.withType(JavaCompile) { options.compilerArgs << "-proc:none" }
tasks.withType(GroovyCompile) { options.compilerArgs << "-proc:none" }

dependencies {
    implementation project(':framework')
    runtimeOnly 'jakarta.servlet:jakarta.servlet-api:6.0.0'
}

// by default the Java plugin runs test on build, change to not do that (only run test if explicit task)
// no longer works as of gradle 4.8 or possibly earlier, use clear() instead: check.dependsOn.remove(test)
check.dependsOn.clear()

task cleanLib(type: Delete) { delete fileTree(dir: projectDir.absolutePath + '/lib', include: '*') }
clean.dependsOn cleanLib

jar {
    destinationDirectory = file(projectDir.absolutePath + '/lib')
    archiveBaseName = jarBaseName
}

tasks.register('copyDependencies', Copy) {
    dependsOn cleanLib
    from (configurations.runtimeClasspath -
          project(':framework').configurations.runtimeClasspath -
          project(':framework').tasks.named('jar').get().archiveFile.get().asFile)
    into file(projectDir.absolutePath + '/lib')
}

jar.dependsOn copyDependencies

def pythonExecutable = providers.gradleProperty('pythonExecutable').orElse('python3')
def agentIndexerDir = layout.projectDirectory.dir('tools/agent-indexer')
def toolsDir = layout.projectDirectory.dir('tools')
def defaultOutputDir = agentIndexerDir.dir('output')
def defaultMoquiRoot = providers.gradleProperty('moquiRoot').orElse(moquiDir.absolutePath)
def defaultMcpEndpoint = providers.gradleProperty('mcpEndpoint').orElse('http://localhost:8080/mcp/message')
def defaultRpcEndpoint = providers.gradleProperty('rpcEndpoint').orElse('http://localhost:8080/rpc/json')
def defaultIndexName = providers.gradleProperty('indexName').orElse('moqui_agent_prompts_v1')
def defaultSessionId = providers.gradleProperty('sessionId').orElse('gradle-session')
def defaultAuthHeader = providers.gradleProperty('authHeader').orNull
// scan-root for knowledge collection; defaults to moqui runtime/component to cover all components
def defaultScanRoot = providers.gradleProperty('scanRoot').orElse(moquiDir.absolutePath + '/runtime/component')
def openSearchRuntimeDir = file(moquiDir.absolutePath + '/runtime/opensearch')
def openSearchConfigSourceDir = layout.projectDirectory.dir('tools/opensearch/config')
def openSearchScriptsSourceDir = layout.projectDirectory.dir('tools/opensearch')

tasks.register('generateAgentDocs', Exec) {
    group = 'moqui-mcp'
    description = 'Generate per-area agent document and evaluation files from SimpleScreens.'
    workingDir = agentIndexerDir.asFile
    commandLine pythonExecutable.get(),
            'generate_full_simplescreens_extension.py',
            '--moqui-root', defaultMoquiRoot.get(),
            '--output-dir', defaultOutputDir.asFile.absolutePath
}

tasks.register('aggregateAgentDocs') {
    group = 'moqui-mcp'
    description = 'Aggregate per-area JSONL outputs into global agent document and evaluation files.'
    inputs.dir(defaultOutputDir)
    outputs.files(
            defaultOutputDir.file('global-screen-prompt-documents.jsonl'),
            defaultOutputDir.file('global-eval-queries.jsonl')
    )
    doLast {
        File outputDir = defaultOutputDir.asFile
        outputDir.mkdirs()
        List<File> promptFiles = fileTree(outputDir) {
            include '**/screen-prompt-documents.jsonl'
            exclude 'global-screen-prompt-documents.jsonl'
        }.files.sort { it.absolutePath }
        List<File> queryFiles = fileTree(outputDir) {
            include '**/screen-prompt-eval-queries.jsonl'
            exclude 'global-eval-queries.jsonl'
        }.files.sort { it.absolutePath }

        File globalDocs = new File(outputDir, 'global-screen-prompt-documents.jsonl')
        File globalQueries = new File(outputDir, 'global-eval-queries.jsonl')
        globalDocs.text = ''
        promptFiles.each { file -> globalDocs << file.getText('UTF-8'); if (!globalDocs.text.endsWith('\n')) globalDocs << '\n' }
        globalQueries.text = ''
        queryFiles.each { file -> globalQueries << file.getText('UTF-8'); if (!globalQueries.text.endsWith('\n')) globalQueries << '\n' }
        println "Wrote ${globalDocs}"
        println "Wrote ${globalQueries}"
    }
}

tasks.register('prepareAgentDocs') {
    group = 'moqui-mcp'
    description = 'Generate and aggregate agent documents for indexing and evaluation.'
    dependsOn 'generateAgentDocs', 'aggregateAgentDocs'
}

tasks.register('indexAgentDocs') {
    group = 'moqui-mcp'
    description = 'Call the Moqui JSON-RPC service to index global agent documents. Embeddings are generated by the service if configured.'
    dependsOn 'prepareAgentDocs'
    doLast {
        if (!defaultAuthHeader) {
            throw new GradleException("Missing -PauthHeader for indexAgentDocs")
        }
        File docsFile = new File(defaultOutputDir.asFile, 'global-screen-prompt-documents.jsonl')
        if (!docsFile.exists()) throw new GradleException("Missing ${docsFile}; run prepareAgentDocs first")

        def payload = groovy.json.JsonOutput.toJson([
                jsonrpc: '2.0',
                id     : 1,
                method : 'org.moqui.agent.AgentDocumentServices.index#AgentDocuments',
                params : [
                        filePath    : docsFile.absolutePath,
                        indexName   : defaultIndexName.get(),
                        forceReindex: true
                ]
        ])
        def connection = new URL(defaultRpcEndpoint.get()).openConnection()
        connection.setRequestMethod('POST')
        connection.setDoOutput(true)
        connection.setRequestProperty('Content-Type', 'application/json')
        connection.setRequestProperty('Authorization', defaultAuthHeader)
        connection.outputStream.withWriter('UTF-8') { it << payload }
        int code = connection.responseCode
        String body = (code >= 200 && code < 300 ? connection.inputStream : connection.errorStream)?.getText('UTF-8')
        println body
        if (code < 200 || code >= 300) throw new GradleException("indexAgentDocs failed with HTTP ${code}")
    }
}

tasks.register('loadMcpData', JavaExec) {
    group = 'moqui-mcp'
    description = 'Load moqui-mcp component data (seed, seed-initial, install). Run after deploying new data files to update ArtifactGroupMember and other seed records in the DB.'
    workingDir = moquiDir
    mainClass = '-jar'
    jvmArgs = ['-server']
    systemProperties = ['moqui.conf': 'conf/MoquiDevConf.xml', 'moqui.runtime': 'runtime']
    args = ['moqui.war', 'load', 'types=seed,seed-initial,install', 'components=moqui-mcp']
}

tasks.register('loadArtifactGraphChunkedInternal', JavaExec) {
    group = 'moqui-mcp'
    description = 'Load the artifact graph from JSONL directly inside Moqui, avoiding web-request transaction limits.'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.moqui.agent.tools.ArtifactGraphLoadRunner'
    workingDir = moquiDir
    def absoluteH2Url = 'jdbc:h2:' + new File(moquiDir, 'runtime/db/h2/moqui').absolutePath + ';lock_timeout=30000'
    systemProperties = [
            'moqui.conf'                    : 'conf/MoquiDevConf.xml',
            'moqui.runtime'                 : 'runtime',
            'entity_ds_url'                 : absoluteH2Url,
            'bitronix.tm.journal.disk.logPart1Filename': moquiDir.absolutePath + '/runtime/txlog/batch-btm1.tlog',
            'bitronix.tm.journal.disk.logPart2Filename': moquiDir.absolutePath + '/runtime/txlog/batch-btm2.tlog',
            'bitronix.tm.serverId'          : 'moqui-mcp-batch',
            'artifactGraph.verticesFilePath': providers.gradleProperty('verticesFilePath').orNull,
            'artifactGraph.edgesFilePath'   : providers.gradleProperty('edgesFilePath').orNull,
            'artifactGraph.summaryFilePath' : providers.gradleProperty('summaryFilePath').orNull,
            'artifactGraph.graphId'         : providers.gradleProperty('graphId').orElse('AgentArtifactGraph').get(),
            'artifactGraph.graphName'       : providers.gradleProperty('graphName').orElse('Agent Artifact Graph').get(),
            'artifactGraph.graphDescription': providers.gradleProperty('graphDescription').orElse('Materialized structural graph for offline-generated Moqui agent artifacts.').get(),
            'artifactGraph.mathModelId'     : providers.gradleProperty('mathModelId').orElse('AgentMoquiRagModel_v1').get(),
            'artifactGraph.clearExisting'   : providers.gradleProperty('clearExisting').orElse('true').get(),
            'artifactGraph.vertexChunkSize' : providers.gradleProperty('vertexChunkSize').orElse('1000').get(),
            'artifactGraph.edgeChunkSize'   : providers.gradleProperty('edgeChunkSize').orElse('1000').get(),
            'artifactGraph.graphTypeEnumId' : providers.gradleProperty('graphTypeEnumId').orNull
    ].findAll { it.value != null }
    doFirst {
        new File(moquiDir, 'runtime/txlog').mkdirs()
        if (!providers.gradleProperty('verticesFilePath').present) {
            throw new GradleException("Missing -PverticesFilePath for loadArtifactGraphChunkedInternal")
        }
        if (!providers.gradleProperty('edgesFilePath').present) {
            throw new GradleException("Missing -PedgesFilePath for loadArtifactGraphChunkedInternal")
        }
    }
}

tasks.register('configureRuntimeOpenSearch') {
    group = 'moqui-mcp'
    description = 'Copy moqui-mcp OpenSearch runtime configuration helpers onto an existing runtime/opensearch installation.'
    doLast {
        if (!openSearchRuntimeDir.exists()) throw new GradleException("Missing runtime/opensearch; run downloadOpenSearch first")
        File targetConfigDir = new File(openSearchRuntimeDir, 'config')
        File targetToolsDir = new File(openSearchRuntimeDir, 'tools/moqui-mcp')
        targetConfigDir.mkdirs()
        targetToolsDir.mkdirs()
        copy {
            from openSearchConfigSourceDir
            into targetConfigDir
        }
        copy {
            from(openSearchScriptsSourceDir) {
                include 'install-opensearch-plugins.sh'
                include 'plugins-report.sh'
            }
            into targetToolsDir
        }
        fileTree(targetToolsDir).matching { include '*.sh' }.files.each { it.setExecutable(true) }
        println "Copied moqui-mcp OpenSearch config to ${targetConfigDir}"
        println "Copied moqui-mcp OpenSearch helper scripts to ${targetToolsDir}"
    }
}

tasks.register('prepareRuntimeOpenSearch') {
    group = 'moqui-mcp'
    description = 'Download standard OpenSearch and then copy moqui-mcp runtime configuration helpers.'
    if (rootProject.tasks.findByName('downloadOpenSearch') != null) dependsOn rootProject.tasks.named('downloadOpenSearch')
    dependsOn 'configureRuntimeOpenSearch'
}

